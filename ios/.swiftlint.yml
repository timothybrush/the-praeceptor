included:
  - Praeceptor
  - PraeceptorTests

excluded:
  - Praeceptor/Resources

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - identical_operands
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

disabled_rules:
  - todo
  - trailing_whitespace
  - large_tuple

line_length:
  warning: 160
  error: 99999
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 99999

type_body_length:
  warning: 300
  error: 99999

file_length:
  warning: 400
  error: 600

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - to
    - vc

force_cast: warning
force_try: warning
