name: Praeceptor
options:
  bundleIdPrefix: com.praeceptor
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    ENABLE_BITCODE: NO
    DEVELOPMENT_TEAM: ""

targets:
  Praeceptor:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Praeceptor
      - Shared
    resources:
      - Praeceptor/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praeceptor.praeceptor
        INFOPLIST_FILE: Praeceptor/Resources/Info.plist
        SWIFT_VERSION: 6.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    info:
      path: Praeceptor/Resources/Info.plist
      properties:
        CFBundleName: Praeceptor
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "The Praeceptor listens to your voice so you can speak directly into the session."
        NSSpeechRecognitionUsageDescription: "The Praeceptor uses speech recognition to transcribe your voice."
        NSDocumentsFolderUsageDescription: "Used to read context from iCloud."
        UIBackgroundModes:
          - audio
        NSSupportsLiveActivities: YES
        NSSupportsLiveActivitiesFrequentUpdates: YES
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - praeceptor
            CFBundleURLName: com.praeceptor.praeceptor
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - target: PraeceptorWidget
        embed: true
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          SWIFTLINT=/opt/homebrew/bin/swiftlint
          if [ -f "$SWIFTLINT" ]; then
            "$SWIFTLINT" --config "${SRCROOT}/../.swiftlint.yml" "${SRCROOT}/Praeceptor"
          elif which swiftlint > /dev/null; then
            swiftlint --config "${SRCROOT}/../.swiftlint.yml" "${SRCROOT}/Praeceptor"
          else
            echo "warning: SwiftLint not installed. Run: brew install swiftlint"
          fi

  PraeceptorWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - PraeceptorWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praeceptor.praeceptor.widget
        SWIFT_VERSION: 6.0
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
    info:
      path: PraeceptorWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PraeceptorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - PraeceptorTests
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Praeceptor.app/Praeceptor
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        PRODUCT_BUNDLE_IDENTIFIER: com.praeceptor.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Praeceptor

  PraeceptorUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - PraeceptorUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praeceptor.uitests
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_APPLICATION: Praeceptor
    dependencies:
      - target: Praeceptor

schemes:
  Praeceptor:
    build:
      targets:
        Praeceptor: all
        PraeceptorWidget: all
        PraeceptorTests: testing
        PraeceptorUITests: testing
    run:
      config: Debug
    test:
      targets:
        - PraeceptorTests
        - PraeceptorUITests
      config: Debug
    archive:
      config: Release
